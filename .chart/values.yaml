releaseOverride: ""

image:
  repository: cdwv/reviewphin
  tag: ""
  pullPolicy: IfNotPresent
  secrets: []

replicaCount: 1

application:
  envSecret: ""
  additionalLabels: {}
  additionalAnnotations: {}
  resources: {}

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: reviewphin.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters: []

probes:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

persistence:
  enabled: true
  existingClaim: ""
  size: ""
  accessMode: ReadWriteOnce
  storageClassName: ""
  dataSubPath: data
  tmpSubPath: tmp
