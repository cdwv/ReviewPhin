name: Quality Gates

on:
  pull_request:
  workflow_call:
    inputs:
      coverage-artifact-name:
        required: false
        type: string
        default: coverage
      run-tests:
        required: false
        type: boolean
        default: true
      run-codeql:
        required: false
        type: boolean
        default: true
      run-dependency-review:
        required: false
        type: boolean
        default: true
      run-scorecard:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    name: test
    if: github.event_name == 'pull_request' || inputs['run-tests']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build docs
        run: pnpm docs:build
        env:
          REVIEWPHIN_BUILD_HOMEPAGE: "true"
          REVIEWPHIN_DOCS_SITE: https://reviewphin.com
          REVIEWPHIN_DOCS_BASE: /
          REVIEWPHIN_POSTHOG_KEY: phc_ci_fixture
          REVIEWPHIN_POSTHOG_HOST: https://us.i.posthog.com

      - name: Test with coverage
        run: pnpm test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs['coverage-artifact-name'] || 'coverage' }}
          path: coverage/
          if-no-files-found: ignore

  codeql:
    name: CodeQL
    if: (github.event_name == 'pull_request' || inputs['run-codeql']) && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3

  dependency-review:
    name: Dependency Review
    if: >
      github.event_name == 'pull_request' &&
      github.event.repository.visibility == 'public' &&
      format('{0}', inputs['run-dependency-review']) != 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: moderate

  scorecard:
    name: OpenSSF Scorecard
    if: inputs['run-scorecard'] && github.event_name != 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: scorecard-results.sarif
