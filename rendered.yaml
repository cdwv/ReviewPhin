---
# Source: reviewphin/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviewphin
  labels:
    helm.sh/chart: reviewphin-0.1.0
    app.kubernetes.io/name: reviewphin
    app.kubernetes.io/instance: reviewphin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reviewphin
      app.kubernetes.io/instance: reviewphin
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reviewphin
        app.kubernetes.io/instance: reviewphin
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: reviewphin
          image: "cdwv/reviewphin:test"
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: "reviewphin-env"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: app-storage
              mountPath: /app/data
              subPath: data
            - name: app-storage
              mountPath: /app/tmp
              subPath: tmp
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: reviewphin-storage
