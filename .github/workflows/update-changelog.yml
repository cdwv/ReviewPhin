# .github/workflows/update-changelog.yml
name: Update Changelog

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build docs
        run: pnpm docs:build
        env:
          REVIEWPHIN_BUILD_HOMEPAGE: "true"
          REVIEWPHIN_DOCS_SITE: https://reviewphin.com
          REVIEWPHIN_DOCS_BASE: /

      - name: Test with coverage
        run: pnpm test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: changelog-gate-coverage
          path: coverage/
          if-no-files-found: ignore

  security:
    name: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  update:
    needs: [test, security]
    uses: happy-changelog/happy-changelog-workflow/.github/workflows/update-changelog.yml@v1.6.1
    permissions:
      contents: write
    with:
      changelog-file: CHANGELOG.md
      enable-npm-version: true
      target-branch: main
      version-title-template: "v:{version} - {date}"
      post-version-script: |
        node <<'NODE'
        const fs = require("node:fs");

        const version = process.env.NEW_VERSION;
        if (!version) {
          throw new Error("NEW_VERSION is required");
        }

        const chartPath = ".chart/Chart.yaml";
        let chart = fs.readFileSync(chartPath, "utf8");
        chart = chart.replace(/^version:\s*.+$/m, `version: ${version}`);
        chart = chart.replace(/^appVersion:\s*.+$/m, `appVersion: "${version}"`);
        fs.writeFileSync(chartPath, chart);
        NODE

        git add .chart/Chart.yaml
