name: PR packages

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - closed

permissions:
  contents: read

concurrency:
  group: pr-packages-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pr-image-policy:
    name: pr-image-policy
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.policy.outputs.publish }}
    steps:
      - name: Check PR image policy
        id: policy
        env:
          EVENT_ACTION: ${{ github.event.action }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'publish-pr-image') }}
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          publish=false
          if [ "$EVENT_ACTION" != "closed" ] && [ "$EVENT_ACTION" != "unlabeled" ] && [ "$HEAD_REPO" = "$BASE_REPO" ] && [ "$HAS_LABEL" = "true" ]; then
            publish=true
          fi

          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

          {
            echo "## PR package policy"
            echo
            echo "| Check | Value |"
            echo "| --- | --- |"
            echo "| Event action | \`${EVENT_ACTION}\` |"
            echo "| PR source repo | \`${HEAD_REPO}\` |"
            echo "| Target repo | \`${BASE_REPO}\` |"
            echo "| Has \`publish-pr-image\` label | \`${HAS_LABEL}\` |"
            echo "| Labels | \`${LABELS_JSON}\` |"
            echo "| Publish PR packages | \`${publish}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-pr-image:
    name: publish-pr-image
    needs: pr-image-policy
    if: >
      needs.pr-image-policy.outputs.publish == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
      tag: ${{ steps.image.outputs.tag }}
      stable_tag: ${{ steps.image.outputs.stable_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          stable_tag="pr-${PR_NUMBER}"
          tag="${stable_tag}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-sha${HEAD_SHA:0:12}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "stable_tag=${stable_tag}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.image.outputs.stable_tag }}
            type=raw,value=${{ steps.image.outputs.tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
            org.opencontainers.image.source=${{ github.event.pull_request.head.repo.html_url }}

      - name: Build and push PR image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REVIEWPHIN_BUILD_HOMEPAGE=false

  publish-pr-chart:
    name: publish-pr-chart
    needs:
      - pr-image-policy
      - publish-pr-image
    if: >
      needs.pr-image-policy.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Prepare PR chart package
        id: chart
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_IMAGE_REPOSITORY: ${{ needs.publish-pr-image.outputs.image }}
          PR_IMAGE_TAG: ${{ needs.publish-pr-image.outputs.tag }}
          PR_IMAGE_STABLE_TAG: ${{ needs.publish-pr-image.outputs.stable_tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p helm-dist
          cp -R .chart .chart-pr

          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const valuesPath = ".chart-pr/values.yaml";
          let values = readFileSync(valuesPath, "utf8");
          values = values
            .replace(/^  repository: .+$/m, `  repository: ${process.env.PR_IMAGE_REPOSITORY}`)
            .replace(/^  tag: .*$/m, `  tag: "${process.env.PR_IMAGE_TAG}"`);
          writeFileSync(valuesPath, values);
          NODE

          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          base_version="$(awk -F': ' '$1 == "version" { print $2; exit }' .chart/Chart.yaml)"
          short_sha="${HEAD_SHA:0:12}"
          chart_version="${base_version}-pr.${PR_NUMBER}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.sha${short_sha}"
          registry="oci://${REGISTRY}/${owner}/charts"

          {
            echo "version=${chart_version}"
            echo "registry=${registry}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## PR chart package"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Chart registry | \`${registry}/reviewphin\` |"
            echo "| Chart version | \`${chart_version}\` |"
            echo "| Default image | \`${PR_IMAGE_REPOSITORY}:${PR_IMAGE_TAG}\` |"
            echo "| Stable image tag | \`${PR_IMAGE_REPOSITORY}:${PR_IMAGE_STABLE_TAG}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint PR chart
        run: helm lint .chart-pr/

      - name: Package PR chart
        run: |
          helm package .chart-pr/ \
            --destination helm-dist \
            --version "${{ steps.chart.outputs.version }}" \
            --app-version "${{ needs.publish-pr-image.outputs.tag }}"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push PR chart
        run: helm push helm-dist/*.tgz "${{ steps.chart.outputs.registry }}"

  cleanup-pr-image:
    name: cleanup-pr-image
    if: >
      (
        github.event.action == 'closed' ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'publish-pr-image')
      ) &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete PR image tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_IMAGE_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          package="${GITHUB_REPOSITORY#*/}"
          package="${package,,}"

          owner_type="$(gh api "users/${owner}" --jq .type)"
          if [ "$owner_type" = "Organization" ]; then
            package_scope="orgs/${owner}"
          else
            package_scope="users/${owner}"
          fi

          version_ids="$(
            gh api --method GET --paginate "${package_scope}/packages/container/${package}/versions" \
              -f per_page=100 \
              --jq ".[] | select(.metadata.container.tags[]? | (. == \"${PR_IMAGE_TAG}\" or startswith(\"${PR_IMAGE_TAG}-\"))) | .id" \
              2>/dev/null || true
          )"

          if [ -z "$version_ids" ]; then
            echo "No GHCR versions found for ${package}:${PR_IMAGE_TAG}."
            exit 0
          fi

          while IFS= read -r version_id; do
            [ -n "$version_id" ] || continue
            gh api --method DELETE "${package_scope}/packages/container/${package}/versions/${version_id}"
            echo "Deleted GHCR version ${version_id} for ${package}:${PR_IMAGE_TAG}."
          done <<< "$version_ids"

  cleanup-pr-chart:
    name: cleanup-pr-chart
    if: >
      (
        github.event.action == 'closed' ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'publish-pr-image')
      ) &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete PR chart versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          package="charts/reviewphin"
          encoded_package="${package//\//%2F}"
          version_marker="-pr.${PR_NUMBER}."

          owner_type="$(gh api "users/${owner}" --jq .type)"
          if [ "$owner_type" = "Organization" ]; then
            package_scope="orgs/${owner}"
          else
            package_scope="users/${owner}"
          fi

          version_ids="$(
            gh api --method GET --paginate "${package_scope}/packages/container/${encoded_package}/versions" \
              -f per_page=100 \
              --jq ".[] | select(.metadata.container.tags[]? | contains(\"${version_marker}\")) | .id" \
              2>/dev/null || true
          )"

          if [ -z "$version_ids" ]; then
            echo "No GHCR chart versions found for ${package} with marker ${version_marker}."
            exit 0
          fi

          while IFS= read -r version_id; do
            [ -n "$version_id" ] || continue
            gh api --method DELETE "${package_scope}/packages/container/${encoded_package}/versions/${version_id}"
            echo "Deleted GHCR chart version ${version_id} for ${package}."
          done <<< "$version_ids"
