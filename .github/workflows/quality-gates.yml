name: Quality Gates

on:
  workflow_call:
    inputs:
      coverage-artifact-name:
        required: false
        type: string
        default: coverage
      run-tests:
        required: false
        type: boolean
        default: true
      run-codeql:
        required: false
        type: boolean
        default: true
      run-dependency-review:
        required: false
        type: boolean
        default: true
      run-scorecard:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    name: test
    if: inputs.run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build docs
        run: pnpm docs:build
        env:
          REVIEWPHIN_BUILD_HOMEPAGE: "true"
          REVIEWPHIN_DOCS_SITE: https://reviewphin.com
          REVIEWPHIN_DOCS_BASE: /

      - name: Test with coverage
        run: pnpm test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: coverage/
          if-no-files-found: ignore

  codeql:
    name: CodeQL
    if: inputs.run-codeql && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency Review
    if: inputs.run-dependency-review && github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  scorecard:
    name: OpenSSF Scorecard
    if: inputs.run-scorecard && github.event_name != 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.2
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
