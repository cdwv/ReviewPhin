name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release, for example v1.2.3"
        required: true
        type: string

run-name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: read

env:
  REVIEWPHIN_DOCKER_IMAGE: cdwv/reviewphin
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build docs with analytics fixture
        run: pnpm docs:build
        env:
          REVIEWPHIN_BUILD_HOMEPAGE: "true"
          REVIEWPHIN_DOCS_SITE: https://reviewphin.com
          REVIEWPHIN_DOCS_BASE: /
          REVIEWPHIN_POSTHOG_KEY: phc_ci_fixture
          REVIEWPHIN_POSTHOG_HOST: https://us.i.posthog.com

      - name: Build docs
        run: pnpm docs:build
        env:
          REVIEWPHIN_BUILD_HOMEPAGE: "true"
          REVIEWPHIN_DOCS_SITE: https://reviewphin.com
          REVIEWPHIN_DOCS_BASE: /

      - name: Test with coverage
        run: pnpm test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-build-artifacts
          path: |
            dist/
            dist-docs-container/
          if-no-files-found: error

  publish-helm-chart:
    name: publish-helm-chart
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Prepare chart registry
        id: chart-registry
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "registry=oci://ghcr.io/${owner}/charts" >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: helm lint .chart/

      - name: Package chart
        run: |
          mkdir -p helm-dist
          helm package .chart/ --destination helm-dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: reviewphin-helm-chart
          path: helm-dist/*.tgz
          if-no-files-found: error

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR
        run: helm push helm-dist/*.tgz "${{ steps.chart-registry.outputs.registry }}"

  publish-docs:
    name: publish-docs
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Pages site
        run: pnpm docs:build
        env:
          REVIEWPHIN_BUILD_HOMEPAGE: "true"
          REVIEWPHIN_DOCS_SITE: https://reviewphin.com
          REVIEWPHIN_DOCS_BASE: /
          REVIEWPHIN_POSTHOG_KEY: ${{ vars.REVIEWPHIN_POSTHOG_KEY || secrets.REVIEWPHIN_POSTHOG_KEY }}
          REVIEWPHIN_POSTHOG_HOST: ${{ vars.REVIEWPHIN_POSTHOG_HOST || secrets.REVIEWPHIN_POSTHOG_HOST }}

      - name: Add custom domain
        run: printf 'reviewphin.com\n' > dist-docs-container/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist-docs-container/

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

  build-and-smoke-test-image:
    name: build-and-smoke-test-image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: reviewphin:smoke
          build-args: |
            REVIEWPHIN_BUILD_HOMEPAGE=false

      - name: Smoke-test container
        run: |
          container_id="$(docker run -d -p 3000 reviewphin:smoke)"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT

          port="$(docker port "$container_id" 3000/tcp | head -n1 | awk -F: '{print $NF}')"

          healthy=false
          for _ in {1..30}; do
            if curl -fsS "http://127.0.0.1:${port}/healthz"; then
              healthy=true
              break
            fi
            sleep 2
          done

          if [ "$healthy" != "true" ]; then
            docker logs "$container_id"
            exit 1
          fi

          docker exec "$container_id" reviewphin --help

  publish-docker:
    name: publish-docker
    needs: build-and-smoke-test-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker-tags
        run: |
          tag="${RELEASE_TAG#refs/tags/}"
          version="${tag#v}"
          tags=()

          add_tag() {
            local value="$1"
            for existing in "${tags[@]}"; do
              if [ "$existing" = "$value" ]; then
                return
              fi
            done
            tags+=("$value")
          }

          add_tag "$tag"
          add_tag "$version"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IFS=. read -r major minor _patch <<< "$version"
            add_tag "${major}.${minor}"
            add_tag latest
          fi

          {
            echo "tags<<EOF"
            for value in "${tags[@]}"; do
              echo "${REVIEWPHIN_DOCKER_IMAGE}:${value}"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REVIEWPHIN_DOCKER_IMAGE }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REVIEWPHIN_BUILD_HOMEPAGE=false

  update-dockerhub-readme:
    name: update-dockerhub-readme
    needs: publish-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Generate Docker Hub README
        run: node scripts/build-docker-readme.cjs
        env:
          PUBLIC_SITE_URL: https://reviewphin.com
          REPOSITORY_REF: ${{ env.RELEASE_TAG }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}

      - name: Upload Docker Hub README artifact
        uses: actions/upload-artifact@v7
        with:
          name: dockerhub-readme
          path: DOCKERHUB_README.md
          if-no-files-found: error

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.REVIEWPHIN_DOCKER_IMAGE }}
          readme-filepath: DOCKERHUB_README.md
          short-description: Self-hosted agentic review for GitLab merge requests and GitHub pull requests.
