# Source: reviewphin/templates/persistent-volume-claim.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reviewphin-storage
  labels:
    helm.sh/chart: reviewphin-0.1.0
    app.kubernetes.io/name: reviewphin
    app.kubernetes.io/instance: reviewphin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: worker
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

