name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build docs
        run: pnpm docs:build
        env:
          REVIEWPHIN_BUILD_HOMEPAGE: "true"
          REVIEWPHIN_DOCS_SITE: https://reviewphin.com
          REVIEWPHIN_DOCS_BASE: /

      - name: Test with coverage
        run: pnpm test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  security:
    name: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
        uses: actions/checkout@v7

      - name: Dependency review
        if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

      - name: Security checks skipped
        if: github.event_name != 'pull_request' || github.event.repository.visibility != 'public'
        run: |
          echo "Dependency review runs on public pull requests."
          echo "Secret scanning is handled outside GitHub Actions."
