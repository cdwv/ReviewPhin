<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="{{iconUrl}}" />
    <title>GitHub setup samples</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: Canvas;
        color: CanvasText;
      }
      main {
        box-sizing: border-box;
        width: min(42rem, 100%);
        margin: 0 auto;
        padding: 3rem 1.25rem;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        line-height: 1.1;
      }
      p {
        color: color-mix(in srgb, CanvasText 70%, transparent);
        line-height: 1.6;
      }
      nav {
        display: grid;
        gap: 0.75rem;
        margin-top: 2rem;
      }
      .sample-link {
        display: block;
        border: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
        border-radius: 0.5rem;
        padding: 0.875rem 1rem;
        color: inherit;
        text-decoration: none;
      }
      .sample-link:hover {
        background: color-mix(in srgb, CanvasText 6%, transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GitHub setup samples</h1>
      <p>
        Preview the setup templates with example data. These pages are served
        outside the setup callback routes.
      </p>
      <nav aria-label="GitHub setup sample pages">
        <a class="sample-link" href="{{registerUrl}}">Register GitHub App</a>
        <a class="sample-link" href="{{installationUrl}}">Install GitHub App</a>
        <a class="sample-link" href="{{successUrl}}">GitHub connection ready</a>
        <a class="sample-link" href="{{errorUrl}}">GitHub setup failed</a>
      </nav>
    </main>
  </body>
</html>
